<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GeoQuest – World Geography Game</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
<style>
:root{
  --accent:#007AFF;--accent-h:#0066D6;--success:#34C759;--error:#FF3B30;--warning:#FF9500;
  --bg:#F0F4F8;--card:#ffffff;--border:rgba(0,0,0,0.09);
  --text:#1C1C1E;--text2:#48484A;--text3:#8E8E93;
  --land:#B8CFE0;--land-h:#8AAFC8;--ocean:#D4E9F7;
  --correct:#34C759;--wrong:#FF3B30;--target:#007AFF;
  --font:'DM Sans',-apple-system,sans-serif;--serif:'DM Serif Display',Georgia,serif;
}
[data-theme=dark]{
  --bg:#0D1117;--card:#161B22;--border:rgba(255,255,255,0.1);
  --text:#E6EDF3;--text2:#8B949E;--text3:#6E7681;
  --land:#2D4A6B;--land-h:#3D5F80;--ocean:#0D1B2A;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:var(--font);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}

/* LOADING */
#loading{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;transition:opacity .4s}
#loading.out{opacity:0;pointer-events:none}
.ld-globe{animation:spin 2s linear infinite;font-size:3rem}
@keyframes spin{to{transform:rotate(360deg)}}
.ld-title{font-family:var(--serif);font-size:2rem;color:var(--text)}
.ld-bar{width:200px;height:4px;background:var(--border);border-radius:99px;overflow:hidden;margin-top:4px}
.ld-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .3s}

/* APP */
#app{display:none;flex-direction:column;height:100dvh;height:100vh}

/* NAV */
nav{height:58px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0;position:relative;z-index:10}
.brand{display:flex;align-items:center;gap:8px;font-family:var(--serif);font-size:1.25rem;color:var(--text)}
.brand svg{flex-shrink:0}
.nav-mid{display:flex;align-items:center;gap:8px}
.pill{display:flex;align-items:center;gap:10px;background:var(--bg);border:1px solid var(--border);border-radius:99px;padding:5px 16px}
.pill-stat{display:flex;align-items:center;gap:5px}
.pill-lbl{font-size:.65rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}
.pill-val{font-size:.9rem;font-weight:700;color:var(--text);min-width:20px;text-align:center}
.pill-val.bump{animation:bump .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes bump{50%{transform:scale(1.6);color:var(--success)}}
.divider{width:1px;height:14px;background:var(--border)}
.nav-btns{display:flex;gap:5px}
.ibtn{width:36px;height:36px;border-radius:99px;border:1px solid var(--border);background:var(--bg);color:var(--text2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0}
.ibtn:hover{background:var(--card);color:var(--accent);transform:scale(1.08)}
.prog{position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--border)}
.prog-bar{height:100%;width:0;background:linear-gradient(90deg,var(--accent),#5AC8FA);transition:width .6s;border-radius:99px}

/* PROMPT */
.prompt-wrap{flex-shrink:0;padding:10px 14px 0}
.prompt{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:12px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;box-shadow:0 2px 12px rgba(0,0,0,.06);position:relative;overflow:hidden}
.prompt::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),#5AC8FA,var(--success))}
.prompt-left{}
.prompt-lbl{font-size:.62rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:2px}
.prompt-country{font-family:var(--serif);font-size:clamp(1.4rem,4vw,2rem);color:var(--text);letter-spacing:-.02em;line-height:1.1}
.prompt-hint{font-size:.72rem;color:var(--accent);font-weight:500;min-height:15px;margin-top:3px}
.prompt-right{display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0}
/* Timer */
.timer-wrap{position:relative;width:44px;height:44px}
.t-ring{transform:rotate(-90deg)}
.t-bg{stroke:var(--border)}
.t-fg{stroke:var(--accent);stroke-linecap:round;transition:stroke-dashoffset 1s linear,stroke .3s}
.t-fg.warn{stroke:var(--warning)}.t-fg.danger{stroke:var(--error)}
.t-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;color:var(--text)}
/* Diff pills */
.diff-pills{display:flex;gap:5px}
.dpill{padding:3px 10px;border-radius:99px;border:1px solid var(--border);background:transparent;font-family:var(--font);font-size:.68rem;font-weight:600;color:var(--text3);cursor:pointer;transition:all .15s}
.dpill.on{background:var(--accent);border-color:var(--accent);color:#fff}

/* MAP CONTAINER */
.map-section{flex:1;padding:8px 14px 0;min-height:0;position:relative}
.map-box{width:100%;height:100%;border-radius:16px;overflow:hidden;background:var(--ocean);border:1px solid var(--border);box-shadow:0 2px 20px rgba(0,0,0,.07);position:relative;cursor:grab}
.map-box:active{cursor:grabbing}
#the-map{display:block;transform-origin:0 0;will-change:transform;user-select:none}
/* SVG country styles */
.country{fill:var(--land);stroke:rgba(255,255,255,.6);stroke-width:.4;cursor:pointer;transition:fill .12s}
[data-theme=dark] .country{stroke:rgba(0,0,0,.4)}
.country:hover{fill:var(--land-h)}
.country.hit-correct{fill:var(--correct)!important;stroke:#fff;stroke-width:1;filter:drop-shadow(0 0 6px rgba(52,199,89,.7));animation:cpop .4s ease}
.country.hit-wrong{fill:var(--wrong)!important;stroke:#fff;stroke-width:1;filter:drop-shadow(0 0 6px rgba(255,59,48,.7));animation:cshake .35s ease}
.country.hit-target{fill:var(--target)!important;stroke:#fff;stroke-width:1;filter:drop-shadow(0 0 8px rgba(0,122,255,.8));animation:cpulse 1s ease infinite}
@keyframes cpop{0%{transform:scale(1)}40%{transform:scale(1.1)}100%{transform:scale(1)}}
@keyframes cshake{20%{transform:translateX(-4px)}40%{transform:translateX(4px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
@keyframes cpulse{50%{opacity:.6}}
.ocean-bg{fill:var(--ocean);cursor:default}
/* Map controls */
.map-ctrls{position:absolute;top:10px;right:10px;display:flex;flex-direction:column;gap:4px;z-index:5}
.mc{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 6px rgba(0,0,0,.08);transition:all .15s;line-height:1}
.mc:hover{color:var(--accent);transform:scale(1.08)}
/* Toast */
.toast{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(.8);background:var(--card);border:1px solid var(--border);border-radius:14px;padding:10px 20px;display:flex;align-items:center;gap:8px;box-shadow:0 8px 32px rgba(0,0,0,.15);opacity:0;pointer-events:none;z-index:20;white-space:nowrap;transition:opacity .15s,transform .15s cubic-bezier(.34,1.56,.64,1)}
.toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
.toast.correct{border-color:var(--correct);background:rgba(52,199,89,.1)}
.toast.wrong{border-color:var(--wrong);background:rgba(255,59,48,.1)}
.toast-i{font-size:1.2rem}.toast-t{font-size:.9rem;font-weight:600;color:var(--text)}

/* FOOTER */
footer{height:64px;flex-shrink:0;background:var(--card);border-top:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:0 16px}
.streak{display:flex;gap:5px;align-items:center}
.dot{width:8px;height:8px;border-radius:99px;background:var(--border);transition:all .2s;flex-shrink:0}
.dot.c{background:var(--correct);transform:scale(1.2)}
.dot.w{background:var(--wrong)}
.dot.cur{background:var(--accent);box-shadow:0 0 0 3px rgba(0,122,255,.2);animation:dp 1.2s ease infinite}
@keyframes dp{50%{box-shadow:0 0 0 6px transparent}}
.foot-row{display:flex;align-items:center;gap:10px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:99px;border:1px solid var(--border);background:var(--bg);color:var(--text2);font-family:var(--font);font-size:.78rem;font-weight:600;cursor:pointer;transition:all .15s}
.btn:hover{background:var(--card);color:var(--text)}
.btn-p{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 2px 10px rgba(0,122,255,.3)}
.btn-p:hover{background:var(--accent-h);transform:translateY(-1px)}
.btn-lg{padding:13px 30px;font-size:.95rem;border-radius:18px}
.hs{display:flex;align-items:center;gap:4px;padding:4px 10px;background:rgba(255,149,0,.1);border:1px solid rgba(255,149,0,.3);border-radius:99px;color:var(--warning);font-size:.75rem;font-weight:700}

/* OVERLAYS */
.ov{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;padding:16px;animation:fdin .2s ease}
@keyframes fdin{from{opacity:0}}
.ov-card{background:var(--card);border:1px solid var(--border);border-radius:22px;padding:28px 24px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.18);display:flex;flex-direction:column;align-items:center;gap:14px;animation:cup .3s cubic-bezier(.34,1.56,.64,1);max-height:94dvh;overflow-y:auto}
@keyframes cup{from{opacity:0;transform:translateY(22px) scale(.96)}}
.ov-title{font-family:var(--serif);font-size:1.9rem;text-align:center;color:var(--text)}
.ov-sub{font-size:.85rem;color:var(--text2);text-align:center;line-height:1.6}
.srow{display:flex;gap:18px;background:var(--bg);border:1px solid var(--border);border-radius:14px;padding:12px 20px;width:100%;justify-content:center}
.sbox{display:flex;flex-direction:column;align-items:center;gap:1px}
.sn{font-family:var(--serif);font-size:1.5rem;color:var(--accent)}
.sl{font-size:.62rem;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;font-weight:500}
.dlbl{font-size:.65rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.drow{display:flex;gap:7px;width:100%}
.db{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:10px 6px;background:var(--bg);border:2px solid var(--border);border-radius:12px;cursor:pointer;font-family:var(--font);transition:all .15s}
.db.on{border-color:var(--accent);background:rgba(0,122,255,.07)}
.db:hover:not(.on){border-color:rgba(0,0,0,.2)}
.di{font-size:1.2rem}.dn{font-size:.78rem;font-weight:700;color:var(--text)}.dd{font-size:.62rem;color:var(--text3)}
.end-em{font-size:2.8rem;animation:ep .45s cubic-bezier(.34,1.56,.64,1) both .1s}
@keyframes ep{from{opacity:0;transform:scale(.3) rotate(-20deg)}}
.ring-wrap{position:relative;width:130px;height:130px;display:flex;align-items:center;justify-content:center}
.rbg{stroke:var(--border)}.rfill{stroke:var(--accent);stroke-linecap:round;transition:stroke-dashoffset 1.1s cubic-bezier(.4,0,.2,1) .3s;transform:rotate(-90deg);transform-origin:65px 65px}
.ring-txt{position:absolute;display:flex;align-items:baseline;gap:1px}
.rbig{font-family:var(--serif);font-size:2.3rem;color:var(--text)}.rof{font-size:.85rem;color:var(--text3)}
.egrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;width:100%}
.estat{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:9px 13px;display:flex;flex-direction:column;gap:2px}
.esl{font-size:.62rem;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}
.esv{font-family:var(--serif);font-size:1.35rem;color:var(--text)}
.esv.ec{color:var(--correct)}.esv.ew{color:var(--wrong)}
.eacts{display:flex;flex-direction:column;gap:7px;width:100%}
.bdgs{display:flex;gap:5px;flex-wrap:wrap;justify-content:center}
.bdg{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:99px;font-size:.68rem;font-weight:600;background:rgba(255,149,0,.1);border:1px solid rgba(255,149,0,.3);color:var(--warning);animation:bpop .3s cubic-bezier(.34,1.56,.64,1) both}
@keyframes bpop{from{opacity:0;transform:scale(.7)}}
#confetti{position:fixed;inset:0;pointer-events:none;z-index:9998}
@media(max-width:520px){
  .brand span{display:none}
  nav{padding:0 10px}
  .ov-card{padding:20px 14px;gap:11px}
  .dd{display:none}
  .srow{gap:12px;padding:10px 14px}
  .prompt-country{font-size:1.3rem}
}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body>

<div id="loading">
  <div class="ld-globe">🌍</div>
  <div class="ld-title">GeoQuest</div>
  <div class="ld-bar"><div class="ld-fill" id="ld-fill" style="width:0%"></div></div>
</div>

<canvas id="confetti"></canvas>

<div id="app">
  <!-- NAV -->
  <nav>
    <div class="brand">
      <svg width="26" height="26" viewBox="0 0 50 50" fill="none"><path d="M10 25a15 15 0 1 1 30 0 15 15 0 0 1-30 0z" fill="#007AFF"/><path d="M18 25c0-2 1-5 7-6-2 2 0 5-1 7s-4 3-3 6c-2-1-4-4-3-7z" fill="white" opacity=".9"/><path d="M30 18c2 1 4 4 3 7-1-2-4-1-5 1s0 5-2 6c-1-2 1-4 0-6s-1-5 4-8z" fill="white" opacity=".7"/></svg>
      <span>GeoQuest</span>
    </div>
    <div class="nav-mid">
      <div class="pill">
        <div class="pill-stat"><span class="pill-lbl">Score</span><span class="pill-val" id="v-score">0</span></div>
        <div class="divider"></div>
        <div class="pill-stat"><span class="pill-lbl">Round</span><span class="pill-val" id="v-round">1/10</span></div>
      </div>
    </div>
    <div class="nav-btns">
      <button class="ibtn" id="snd-btn" title="Sound"><svg id="snd-ic" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg></button>
      <button class="ibtn" id="theme-btn" title="Theme"><svg id="theme-ic" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/></svg></button>
    </div>
    <div class="prog"><div class="prog-bar" id="prog-bar"></div></div>
  </nav>

  <!-- PROMPT -->
  <div class="prompt-wrap">
    <div class="prompt">
      <div class="prompt-left">
        <div class="prompt-lbl">👆 Click this country on the map</div>
        <div class="prompt-country" id="prompt-country">–</div>
        <div class="prompt-hint" id="prompt-hint"></div>
      </div>
      <div class="prompt-right">
        <div class="timer-wrap">
          <svg class="t-ring" viewBox="0 0 44 44" width="44" height="44">
            <circle class="t-bg" cx="22" cy="22" r="18" fill="none" stroke-width="3"/>
            <circle class="t-fg" id="t-fg" cx="22" cy="22" r="18" fill="none" stroke-width="3" stroke-dasharray="113.1" stroke-dashoffset="0"/>
          </svg>
          <div class="t-num" id="t-num">15</div>
        </div>
        <div class="diff-pills">
          <button class="dpill on" data-d="easy">Easy</button>
          <button class="dpill" data-d="medium">Med</button>
          <button class="dpill" data-d="hard">Hard</button>
        </div>
      </div>
    </div>
  </div>

  <!-- MAP -->
  <div class="map-section">
    <div class="map-box" id="map-box">
      <svg id="the-map" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2000 1000" style="width:100%;height:100%"></svg>
      <div class="map-ctrls">
        <button class="mc" id="zi">+</button>
        <button class="mc" id="zo">−</button>
        <button class="mc" id="zr">⊙</button>
      </div>
      <div class="toast" id="toast"><span class="toast-i" id="ti"></span><span class="toast-t" id="tt"></span></div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <div class="streak" id="streak"></div>
    <div class="foot-row">
      <button class="btn" id="skip-btn">Skip</button>
      <div class="hs">⭐ <span id="hs-v">0</span></div>
      <button class="btn" id="hint-btn">Hint 💡</button>
    </div>
  </footer>
</div>

<!-- START -->
<div class="ov" id="start-ov">
  <div class="ov-card">
    <div style="font-size:3rem">🌍</div>
    <div class="ov-title">GeoQuest</div>
    <div class="ov-sub">Test your world geography knowledge.<br>Click the correct country on the map!</div>
    <div class="srow">
      <div class="sbox"><span class="sn" id="s-count">80</span><span class="sl">Countries</span></div>
      <div class="sbox"><span class="sn">10</span><span class="sl">Rounds</span></div>
      <div class="sbox"><span class="sn" id="s-hs">0</span><span class="sl">Best</span></div>
    </div>
    <div class="dlbl">Difficulty</div>
    <div class="drow" id="start-drow">
      <button class="db on" data-d="easy"><span class="di">🌍</span><span class="dn">Easy</span><span class="dd">Major nations</span></button>
      <button class="db" data-d="medium"><span class="di">🧭</span><span class="dn">Medium</span><span class="dd">More countries</span></button>
      <button class="db" data-d="hard"><span class="di">🔬</span><span class="dn">Hard</span><span class="dd">All regions</span></button>
    </div>
    <button class="btn btn-p btn-lg" id="start-btn">▶ Start Game</button>
    <div style="font-size:.65rem;color:var(--text3)">H = hint · Esc = skip</div>
  </div>
</div>

<!-- END -->
<div class="ov" id="end-ov" style="display:none">
  <div class="ov-card">
    <div class="end-em" id="end-em">🌍</div>
    <div class="ov-title" id="end-title">Game Over</div>
    <div class="ov-sub" id="end-msg">–</div>
    <div class="ring-wrap">
      <svg viewBox="0 0 130 130" width="130" height="130">
        <circle class="rbg" cx="65" cy="65" r="52" fill="none" stroke-width="8"/>
        <circle class="rfill" id="r-fill" cx="65" cy="65" r="52" fill="none" stroke-width="8" stroke-dasharray="326.7" stroke-dashoffset="326.7"/>
      </svg>
      <div class="ring-txt"><span class="rbig" id="r-score">0</span><span class="rof">/10</span></div>
    </div>
    <div class="egrid">
      <div class="estat"><span class="esl">Correct</span><span class="esv ec" id="e-c">0</span></div>
      <div class="estat"><span class="esl">Wrong</span><span class="esv ew" id="e-w">0</span></div>
      <div class="estat"><span class="esl">Best Score</span><span class="esv" id="e-hs">0</span></div>
      <div class="estat"><span class="esl">Accuracy</span><span class="esv" id="e-acc">0%</span></div>
    </div>
    <div class="bdgs" id="bdgs"></div>
    <div class="eacts">
      <button class="btn btn-p btn-lg" id="again-btn">Play Again</button>
      <button class="btn btn-lg" id="share-btn">Share Score</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════════════
//  COUNTRY DATA  –  80 countries across all continents
// ═══════════════════════════════════════════════════════════════
const COUNTRIES = [
  // ── AMERICAS ──────────────────────────────────────────────
  {id:'US',name:'United States',   cap:'Washington D.C.',diff:'easy',  hints:['50 states','Borders Canada & Mexico']},
  {id:'CA',name:'Canada',          cap:'Ottawa',         diff:'easy',  hints:['2nd largest country','Known for maple syrup']},
  {id:'MX',name:'Mexico',          cap:'Mexico City',    diff:'easy',  hints:['Borders USA to north','Land of tacos']},
  {id:'BR',name:'Brazil',          cap:'Brasília',       diff:'easy',  hints:['Largest in S. America','Amazon rainforest']},
  {id:'AR',name:'Argentina',       cap:'Buenos Aires',   diff:'easy',  hints:['2nd largest in S. America','Famous for tango']},
  {id:'CO',name:'Colombia',        cap:'Bogotá',         diff:'medium',hints:['Top coffee producer','Named after Columbus']},
  {id:'PE',name:'Peru',            cap:'Lima',           diff:'medium',hints:['Home of Machu Picchu','Amazon starts here']},

  ['AU', poly([[115.6,-33.6],[117,-35.1],[121,-33.8],[123.8,-33.6],[126.8,-33.9],[129,-33.7],[131.4,-31.5],[131.3,-29.5],[130.4,-24.1],[130.8,-20.3],[133.7,-14.6],[134,-12.6],[135.8,-14.9],[136.5,-13.6],[136.3,-15.9],[135.8,-14.9],[134,-12.6],[135.6,-10.9],[136.8,-11.9],[138,-11.5],[139.6,-12.4],[140,-17],[141.1,-20],[141.6,-26.3],[140.8,-29.6],[141,-33.9],[140,-33.7],[138.2,-34.7],[137.4,-35.1],[136.1,-35.7],[134.7,-35.9],[133.8,-35.6],[132.5,-34.3],[131,-33.6],[130,-33.9],[129,-33.7],[126.8,-33.9],[123.8,-33.6],[121,-33.8],[117,-35.1],[115.6,-33.6]])],

  ['NZ', poly([[173.9,-39.8],[175.6,-37.4],[176,-37.6],[177.5,-38],[178,-37.6],[177.8,-36.8],[174.8,-36.7],[174.4,-36.2],[173.8,-35.1],[172.7,-34.4],[172.8,-36],[172.3,-38],[173.9,-39.8]])],

  ['PG', poly([[141,-6.8],[143.5,-6.5],[145.8,-5.8],[148.5,-5.6],[150,-6],[152,-6.5],[150,-8],[148.5,-9.5],[145.5,-10.5],[143,-10],[141,-9],[141,-6.8]])],
];

// ═══════════════════════════════════════════════════════════════
//  STORAGE
// ═══════════════════════════════════════════════════════════════
const S = {
  g:(k,d)=>{try{const v=localStorage.getItem(k);return v!=null?JSON.parse(v):d}catch{return d}},
  s:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
};
let curHs = S.g('gq_hs',0);
let sndOn = S.g('gq_snd',true);
const saveHs = n => { curHs=n; S.s('gq_hs',n); };

// ═══════════════════════════════════════════════════════════════
//  SOUND
// ═══════════════════════════════════════════════════════════════
let actx = null;
const ac = () => { if(!actx) try{ actx=new(window.AudioContext||window.webkitAudioContext)() }catch{} return actx; };
const tone = (freqs,type='sine',dur=.15,vol=.13) => {
  if(!sndOn) return; const c=ac(); if(!c) return; const t=c.currentTime;
  freqs.forEach((f,i)=>{ const o=c.createOscillator(),g=c.createGain(); o.connect(g); g.connect(c.destination); o.type=type; o.frequency.setValueAtTime(f,t+i*.06); g.gain.setValueAtTime(vol,t+i*.06); g.gain.exponentialRampToValueAtTime(.001,t+i*.06+dur); o.start(t+i*.06); o.stop(t+i*.06+dur+.05); });
};
const Snd = { correct:()=>tone([523,659,784],'triangle',.2,.16), wrong:()=>tone([330,277],'sawtooth',.18,.12), click:()=>tone([880],'sine',.06,.07), start:()=>tone([262,330,392,523],'triangle',.18,.14), victory:()=>tone([523,659,784,1047],'triangle',.25,.18), tick:()=>tone([440],'square',.07,.06) };

// ═══════════════════════════════════════════════════════════════
//  CONFETTI
// ═══════════════════════════════════════════════════════════════
const cv=document.getElementById('confetti'),cx=cv.getContext('2d');
let cp=[],cr=null;
const cr_=()=>{cv.width=innerWidth;cv.height=innerHeight};
addEventListener('resize',cr_);cr_();
const COLS=['#007AFF','#34C759','#FF9500','#FF3B30','#AF52DE','#5AC8FA','#FFD60A'];
const mkc=()=>({x:Math.random()*cv.width,y:-10,r:Math.random()*6+3,vx:(Math.random()-.5)*3,vy:Math.random()*3+2,color:COLS[Math.floor(Math.random()*COLS.length)],angle:Math.random()*Math.PI*2,spin:(Math.random()-.5)*.2,rect:Math.random()>.5,alpha:1});
const cloop=()=>{ cx.clearRect(0,0,cv.width,cv.height); cp=cp.filter(p=>p.alpha>.05); cp.forEach(p=>{ p.x+=p.vx;p.y+=p.vy;p.vy+=.06;p.angle+=p.spin; if(p.y>cv.height*.7)p.alpha-=.02; cx.save();cx.globalAlpha=p.alpha;cx.translate(p.x,p.y);cx.rotate(p.angle);cx.fillStyle=p.color; if(p.rect)cx.fillRect(-p.r/2,-p.r/2,p.r,p.r*1.5); else{cx.beginPath();cx.arc(0,0,p.r/2,0,Math.PI*2);cx.fill();} cx.restore(); }); if(cp.length)cr=requestAnimationFrame(cloop); else{cx.clearRect(0,0,cv.width,cv.height);cr=null;} };
const burst=(n=120)=>{for(let i=0;i<n;i++)setTimeout(()=>cp.push(mkc()),i*12);if(!cr)cloop();};
const stopConf=()=>{cp=[];if(cr){cancelAnimationFrame(cr);cr=null;}cx.clearRect(0,0,cv.width,cv.height);};

// ═══════════════════════════════════════════════════════════════
//  MAP
// ═══════════════════════════════════════════════════════════════
const theMap = document.getElementById('the-map');
const mapBox  = document.getElementById('map-box');
let msc=1, mox=0, moy=0, mdrag=false, mds={x:0,y:0};
let mapCb = null;

// Build ocean background
const ns = 'http://www.w3.org/2000/svg';
const ocean = document.createElementNS(ns,'rect');
ocean.setAttribute('width','2000');ocean.setAttribute('height','1000');
ocean.setAttribute('class','ocean-bg');ocean.style.cursor='default';
theMap.appendChild(ocean);

// Build country paths
const pathEls = new Map();
MAP_PATHS.forEach(([id,d])=>{
  const p = document.createElementNS(ns,'path');
  p.setAttribute('d',d);
  p.setAttribute('class','country');
  p.setAttribute('data-id',id);
  p.setAttribute('tabindex','0');
  p.setAttribute('aria-label',(CMAP.get(id)||{name:id}).name);
  theMap.appendChild(p);
  pathEls.set(id,p);
});

// Also build paths for countries without game data (greyed out decoration)
// Map transform
const mApply=()=>theMap.style.transform=`translate(${mox}px,${moy}px) scale(${msc})`;
const mClamp=()=>{
  const bw=mapBox.clientWidth, bh=mapBox.clientHeight;
  const sw=bw*msc, sh=bh*msc;
  const maxX=Math.max(0,(sw-bw)/2+100), maxY=Math.max(0,(sh-bh)/2+100);
  mox=Math.max(-maxX,Math.min(maxX,mox));
  moy=Math.max(-maxY,Math.min(maxY,moy));
};

// Click / keyboard on map paths
theMap.addEventListener('click',e=>{
  const p=e.target.closest('[data-id]');
  if(p&&mapCb){ Snd.click(); mapCb(p.getAttribute('data-id')); }
});
theMap.addEventListener('keydown',e=>{
  if((e.key==='Enter'||e.key===' ')&&e.target.getAttribute('data-id')){
    e.preventDefault(); Snd.click();
    if(mapCb) mapCb(e.target.getAttribute('data-id'));
  }
});

// Drag / pan
mapBox.addEventListener('pointerdown',e=>{
  if(e.target.closest('[data-id]')) return;
  mdrag=true; mds={x:e.clientX-mox,y:e.clientY-moy};
  mapBox.setPointerCapture(e.pointerId);
});
mapBox.addEventListener('pointermove',e=>{
  if(!mdrag) return;
  mox=e.clientX-mds.x; moy=e.clientY-mds.y;
  mClamp(); mApply();
});
mapBox.addEventListener('pointerup',()=>mdrag=false);
mapBox.addEventListener('pointercancel',()=>mdrag=false);
mapBox.addEventListener('wheel',e=>{
  e.preventDefault();
  msc=Math.max(.6,Math.min(5,msc*(e.deltaY>0?.9:1.12)));
  mClamp(); mApply();
},{passive:false});

document.getElementById('zi').onclick=()=>{msc=Math.min(5,msc*1.3);mClamp();mApply();};
document.getElementById('zo').onclick=()=>{msc=Math.max(.6,msc*.77);mClamp();mApply();};
document.getElementById('zr').onclick=()=>{msc=1;mox=0;moy=0;mApply();};

// Highlight helpers
const clearMap=()=>{ pathEls.forEach(p=>p.setAttribute('class','country')); };
const markMap=(id,cls)=>{
  const p=pathEls.get(id);
  if(p) p.setAttribute('class',`country ${cls}`);
};

// ═══════════════════════════════════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════════════════════════════════
const $=id=>document.getElementById(id);
let toastT=null;
const showToast=(type,msg)=>{
  clearTimeout(toastT);
  const t=$('toast'); t.className=`toast show ${type}`;
  $('ti').textContent=type==='correct'?'✅':'❌';
  $('tt').textContent=msg;
  toastT=setTimeout(()=>t.className='toast',2000);
};
const setTimerUI=(s,max)=>{
  const fg=$('t-fg');
  fg.style.strokeDashoffset=113.1*(1-s/max);
  $('t-num').textContent=s;
  const r=s/max;
  fg.setAttribute('class','t-fg'+(r<=.25?' danger':r<=.5?' warn':''));
  if(s<=5&&s>0) Snd.tick();
};

// ═══════════════════════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════════════════════
let score=0, round=0, rounds=[], diff='easy';
let history=[], timerSec=0, timerMax=15, timerID=null, current=null;
const MAX=10, TMAX={easy:20,medium:15,hard:10};

const shuffle=a=>{const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;};
const pool=d=>{const ts={easy:['easy'],medium:['easy','medium'],hard:['easy','medium','hard']}[d]||['easy']; return COUNTRIES.filter(c=>ts.includes(c.diff)&&pathEls.has(c.id));};

const buildStreak=()=>{
  const s=$('streak'); s.innerHTML='';
  for(let i=0;i<MAX;i++){const d=document.createElement('div');d.className='dot'+(i===0?' cur':'');s.appendChild(d);}
};
const markDot=(idx,type)=>{
  const ds=$('streak').querySelectorAll('.dot');
  if(ds[idx]){ds[idx].className=`dot ${type}`;}
  if(ds[idx+1])ds[idx+1].classList.add('cur');
};

const stopTimer=()=>{clearInterval(timerID);timerID=null;};
const startTimer=()=>{
  stopTimer(); timerSec=timerMax; setTimerUI(timerSec,timerMax);
  timerID=setInterval(()=>{timerSec--;setTimerUI(timerSec,timerMax);if(timerSec<=0){stopTimer();onTimeout();}},1000);
};

const nextRound=()=>{
  if(round>=MAX){endGame();return;}
  current=rounds[round];
  if(!current){round++;nextRound();return;}
  // Update prompt – force animation restart
  const el=$('prompt-country');
  el.style.animation='none';
  void el.offsetHeight; // reflow to restart animation
  el.style.animation='';
  el.textContent=current.name;
  $('prompt-hint').textContent='';
  $('v-round').textContent=`${round+1}/${MAX}`;
  $('prog-bar').style.width=`${(round/MAX)*100}%`;
  clearMap();
  startTimer();
};

const resolve=(ok,msg)=>{
  stopTimer();
  history.push(ok?'correct':'wrong');
  markDot(round,ok?'correct':'wrong');
  if(ok){
    score++;
    const sv=$('v-score'); sv.textContent=score;
    sv.classList.remove('bump'); void sv.offsetWidth; sv.classList.add('bump');
  }
  showToast(ok?'correct':'wrong',msg);
  if(ok){ markMap(current.id,'hit-correct'); Snd.correct(); }
  else  { markMap(current.id,'hit-wrong'); setTimeout(()=>markMap(current.id,'hit-target'),500); Snd.wrong(); }
  round++;
  setTimeout(()=>{clearMap();nextRound();},1900);
};

const onTimeout=()=>{
  history.push('wrong'); markDot(round,'wrong');
  if(current) markMap(current.id,'hit-target');
  showToast('wrong',`⏰ Time's up! – ${current?.name||'?'}`);
  Snd.wrong(); round++;
  setTimeout(()=>{clearMap();nextRound();},1900);
};

const endGame=()=>{
  stopTimer();
  if(score>curHs) saveHs(score);
  $('hs-v').textContent=curHs; $('s-hs').textContent=curHs;
  const correct=history.filter(r=>r==='correct').length;
  $('r-score').textContent=score;
  $('e-c').textContent=correct;
  $('e-w').textContent=MAX-correct;
  $('e-hs').textContent=curHs;
  $('e-acc').textContent=Math.round(correct/MAX*100)+'%';
  setTimeout(()=>{
    $('r-fill').style.strokeDashoffset=326.7*(1-score/MAX);
    $('r-fill').style.stroke=score>=8?'var(--correct)':score>=5?'var(--accent)':'var(--wrong)';
  },250);
  const msgs=[
    {min:10,e:'🏆',t:'Perfect Score!',  m:'You know the world inside out!'},
    {min:8, e:'⭐',t:'Excellent!',      m:'Incredible geography skills!'},
    {min:6, e:'🌍',t:'Well Done!',      m:'Solid knowledge of the world map.'},
    {min:4, e:'🧭',t:'Good Attempt!',   m:"Keep exploring — you'll get better!"},
    {min:0, e:'🌱',t:'Keep Learning!',  m:'The world is vast — keep exploring!'},
  ];
  const r=msgs.find(m=>score>=m.min)||msgs[4];
  $('end-em').textContent=r.e; $('end-title').textContent=r.t; $('end-msg').textContent=r.m;
  const bd=$('bdgs'); bd.innerHTML='';
  const addB=(icon,label)=>{const b=document.createElement('div');b.className='bdg';b.textContent=`${icon} ${label}`;bd.appendChild(b);};
  if(score===10) addB('🏆','Perfect Score');
  if(score>=8)   addB('⭐','Expert');
  let st=0; for(const rr of history){if(rr==='correct'){st++;if(st>=3){addB('🔥','3 in a row');break;}}else st=0;}
  if(score===0)  addB('😅','Keep Practicing');
  $('end-ov').style.display='flex';
  if(score===MAX){setTimeout(()=>burst(),300);Snd.victory();}
};

const startGame=()=>{
  stopConf(); score=0; round=0; history=[];
  timerMax=TMAX[diff]||15;
  $('v-score').textContent=0; $('v-round').textContent=`1/${MAX}`; $('prog-bar').style.width='0';
  $('hs-v').textContent=curHs; $('r-fill').style.strokeDashoffset='326.7';
  $('end-ov').style.display='none'; $('start-ov').style.display='none';
  clearMap(); msc=1; mox=0; moy=0; mApply();
  buildStreak();
  rounds=shuffle(pool(diff)).slice(0,MAX);
  if(rounds.length<MAX){ const ex=shuffle(pool('hard')).filter(c=>!rounds.includes(c)); rounds=[...rounds,...ex].slice(0,MAX); }
  Snd.start();
  nextRound();
};

// ═══════════════════════════════════════════════════════════════
//  WIRING
// ═══════════════════════════════════════════════════════════════
mapCb = id => resolve(id===current?.id, id===current?.id?`✨ ${current.name}!`:`It was ${current?.name||'?'}`);

$('start-btn').onclick=()=>{ Snd.click(); startGame(); };
$('again-btn').onclick=()=>{ Snd.click(); startGame(); };
$('skip-btn').onclick=()=>{
  if(!current)return; Snd.click(); stopTimer();
  history.push('wrong'); markDot(round,'wrong');
  showToast('wrong',`Skipped – ${current.name}`);
  markMap(current.id,'hit-target'); Snd.wrong();
  round++; setTimeout(()=>{clearMap();nextRound();},1900);
};
$('hint-btn').onclick=()=>{
  if(!current)return; Snd.click();
  const h=current.hints;
  $('prompt-hint').textContent=h&&h.length?`💡 ${h[0]}`:`💡 Capital: ${current.cap}`;
};
$('share-btn').onclick=()=>{
  const txt=`🌍 GeoQuest: I scored ${$('r-score').textContent}/10 on ${diff} mode! Can you beat me?`;
  if(navigator.share) navigator.share({title:'GeoQuest',text:txt}).catch(()=>{});
  else if(navigator.clipboard) navigator.clipboard.writeText(txt).then(()=>showToast('correct','Copied to clipboard!'));
};

// Difficulty – both start screen and in-game
['start-drow','diff-pills'].forEach(rowId=>{
  const row=document.getElementById(rowId);
  if(!row)return;
  row.addEventListener('click',e=>{
    const b=e.target.closest('[data-d]');
    if(!b)return;
    diff=b.getAttribute('data-d');
    Snd.click();
    // update both rows
    document.querySelectorAll('[data-d]').forEach(el=>{
      el.classList.toggle('on',el.getAttribute('data-d')===diff);
      el.classList.toggle('active',el.getAttribute('data-d')===diff);
    });
  });
});

// Sound toggle
$('snd-btn').onclick=()=>{
  sndOn=!sndOn; S.s('gq_snd',sndOn);
  $('snd-ic').innerHTML=sndOn
    ?'<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>'
    :'<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>';
};

// Theme toggle
$('theme-btn').onclick=()=>{
  const dark=document.documentElement.getAttribute('data-theme')==='dark';
  const t=dark?'light':'dark';
  document.documentElement.setAttribute('data-theme',t);
  S.s('gq_theme',t);
  $('theme-ic').innerHTML=dark
    ?'<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>'
    :'<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
};

// Keyboard shortcuts
document.addEventListener('keydown',e=>{
  if(e.key==='Escape') $('skip-btn').click();
  if(e.key==='h'||e.key==='H') $('hint-btn').click();
});

// ═══════════════════════════════════════════════════════════════
//  BOOT  –  guaranteed to show app
// ═══════════════════════════════════════════════════════════════
(()=>{
  // Restore theme
  const t=S.g('gq_theme','light');
  document.documentElement.setAttribute('data-theme',t);
  if(t==='dark') $('theme-ic').innerHTML='<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
  if(!sndOn) $('snd-ic').innerHTML='<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>';
  $('s-hs').textContent=curHs;
  $('hs-v').textContent=curHs;
  $('s-count').textContent=COUNTRIES.length;

  // Show app after brief load animation
  const fill=$('ld-fill');
  let p=0;
  const interval=setInterval(()=>{
    p+=Math.random()*30+15;
    fill.style.width=Math.min(p,95)+'%';
    if(p>=95){
      clearInterval(interval);
      fill.style.width='100%';
      setTimeout(()=>{
        $('loading').classList.add('out');
        $('app').style.display='flex';
        $('start-ov').style.display='flex';
        setTimeout(()=>$('loading').style.display='none',500);
      },300);
    }
  },80);

  // Absolute failsafe – 4 seconds max
  setTimeout(()=>{
    $('loading').style.display='none';
    $('app').style.display='flex';
    if($('start-ov').style.display==='none') $('start-ov').style.display='flex';
  },4000);
})();
</script>
