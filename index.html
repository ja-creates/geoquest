<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GeoQuest – World Geography Game</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
<style>
:root {
  --accent:#007AFF;--accent-h:#0066D6;--success:#34C759;--error:#FF3B30;
  --warning:#FF9500;--bg:#F5F5F7;--card:#ffffff;--border:rgba(0,0,0,0.08);
  --text:#1C1C1E;--text2:#48484A;--text3:#8E8E93;
  --map-land:#C8D8E8;--map-hover:#9BBDD4;--map-ocean:#D6E8F5;
  --map-correct:#34C759;--map-wrong:#FF3B30;--map-target:#007AFF;
  --shadow:0 4px 20px rgba(0,0,0,0.08);--r:14px;--rf:999px;
  --font:'DM Sans',-apple-system,sans-serif;--serif:'DM Serif Display',Georgia,serif;
}
[data-theme=dark]{
  --bg:#0A0A0F;--card:#1C1C20;--border:rgba(255,255,255,0.09);
  --text:#F2F2F7;--text2:#EBEBF5CC;--text3:#EBEBF599;
  --map-land:#2C3E50;--map-hover:#3A5068;--map-ocean:#1A2535;
  --shadow:0 4px 20px rgba(0,0,0,0.4);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:var(--font);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}
/* LOADING */
#loading{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;transition:opacity .3s}
#loading.out{opacity:0;pointer-events:none}
.ld-logo{animation:ld-spin 1.5s linear infinite}
@keyframes ld-spin{to{transform:rotate(360deg)}}
.ld-title{font-family:var(--serif);font-size:2rem;color:var(--text)}
.ld-bar{width:180px;height:4px;background:var(--border);border-radius:var(--rf);overflow:hidden}
.ld-fill{height:100%;width:0;background:var(--accent);transition:width .3s;border-radius:var(--rf)}
/* APP */
#app{display:none;flex-direction:column;height:100dvh}
/* NAV */
nav{height:60px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0;position:relative}
.nav-brand{display:flex;align-items:center;gap:8px;font-family:var(--serif);font-size:1.3rem;color:var(--text)}
.nav-stats{display:flex;align-items:center;gap:12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--rf);padding:4px 14px}
.stat{display:flex;align-items:center;gap:6px}
.stat-l{font-size:.68rem;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.04em}
.stat-v{font-size:.88rem;font-weight:700;color:var(--text);min-width:18px;text-align:center}
.stat-v.bump{animation:bump .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes bump{50%{transform:scale(1.5);color:var(--success)}}
.nav-btns{display:flex;gap:6px}
.icon-btn{width:36px;height:36px;border-radius:var(--rf);border:1px solid var(--border);background:var(--bg);color:var(--text2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
.icon-btn:hover{background:var(--card);color:var(--accent);transform:scale(1.06)}
.prog-track{position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--border)}
.prog-fill{height:100%;width:0;background:linear-gradient(90deg,var(--accent),#5AC8FA);transition:width .5s;border-radius:var(--rf)}
/* MAIN */
main{flex:1;display:flex;flex-direction:column;padding:10px 14px 8px;gap:8px;min-height:0;overflow:hidden}
/* PROMPT */
.prompt{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:12px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden;flex-shrink:0}
.prompt::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),#5AC8FA)}
.prompt-inner{display:flex;align-items:center;justify-content:space-between}
.prompt-lbl{font-size:.65rem;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.prompt-name{font-family:var(--serif);font-size:clamp(1.3rem,4vw,1.9rem);color:var(--text);letter-spacing:-.02em;animation:slide-in .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes slide-in{from{opacity:0;transform:translateY(6px) scale(.95)}}
.prompt-hint{font-size:.75rem;color:var(--accent);font-weight:500;min-height:16px;margin-top:3px}
.timer-wrap{position:relative;width:42px;height:42px;flex-shrink:0}
.timer-ring{transform:rotate(-90deg)}
.timer-bg{stroke:var(--border)}
.timer-fg{stroke:var(--accent);stroke-linecap:round;transition:stroke-dashoffset 1s linear,stroke .3s}
.timer-fg.warn{stroke:var(--warning)}
.timer-fg.danger{stroke:var(--error)}
.timer-txt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;color:var(--text)}
/* MAP */
.map-wrap{flex:1;position:relative;border-radius:16px;overflow:hidden;background:var(--map-ocean);border:1px solid var(--border);min-height:0}
.map-inner{width:100%;height:100%;overflow:hidden;cursor:grab;user-select:none}
.map-inner:active{cursor:grabbing}
#map-svg{width:100%;height:100%;transform-origin:center;will-change:transform}
#map-svg path{fill:var(--map-land);stroke:rgba(255,255,255,.45);stroke-width:.5;cursor:pointer;transition:fill .15s}
[data-theme=dark] #map-svg path{stroke:rgba(0,0,0,.3)}
#map-svg path:hover{fill:var(--map-hover)}
#map-svg path.correct{fill:var(--map-correct)!important;filter:drop-shadow(0 0 5px rgba(52,199,89,.7));animation:pop .45s cubic-bezier(.34,1.56,.64,1)}
#map-svg path.wrong{fill:var(--map-wrong)!important;filter:drop-shadow(0 0 5px rgba(255,59,48,.7));animation:shake .35s ease}
#map-svg path.target{fill:var(--map-target)!important;filter:drop-shadow(0 0 7px rgba(0,122,255,.8));animation:pulse 1s ease infinite}
@keyframes pop{40%{transform:scale(1.1)}100%{transform:scale(1)}}
@keyframes shake{20%{transform:translateX(-4px)}40%{transform:translateX(4px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
@keyframes pulse{50%{opacity:.6}}
.map-ctrls{position:absolute;bottom:12px;right:12px;display:flex;flex-direction:column;gap:4px}
.map-btn{width:34px;height:34px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.06);transition:all .15s;line-height:1}
.map-btn:hover{color:var(--accent);transform:scale(1.06)}
/* TOAST */
.toast{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(.85);background:var(--card);border:1px solid var(--border);border-radius:16px;padding:11px 20px;display:flex;align-items:center;gap:8px;box-shadow:0 12px 40px rgba(0,0,0,.12);opacity:0;pointer-events:none;z-index:50;white-space:nowrap;transition:opacity .15s,transform .15s cubic-bezier(.34,1.56,.64,1)}
.toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
.toast.correct{border-color:var(--success);background:rgba(52,199,89,.1)}
.toast.wrong{border-color:var(--error);background:rgba(255,59,48,.1)}
.toast-icon{font-size:1.2rem}
.toast-txt{font-size:.9rem;font-weight:600;color:var(--text)}
/* FOOTER */
footer{height:66px;flex-shrink:0;background:var(--card);border-top:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;padding:0 16px}
.streak{display:flex;gap:5px}
.dot{width:8px;height:8px;border-radius:var(--rf);background:var(--border);transition:background .2s,transform .2s}
.dot.correct{background:var(--success);transform:scale(1.15)}
.dot.wrong{background:var(--error)}
.dot.cur{background:var(--accent);box-shadow:0 0 0 3px rgba(0,122,255,.2);animation:dot-p 1.2s ease infinite}
@keyframes dot-p{50%{box-shadow:0 0 0 6px transparent}}
.foot-row{display:flex;align-items:center;gap:10px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 16px;border-radius:var(--rf);border:1px solid var(--border);background:var(--bg);color:var(--text2);font-family:var(--font);font-size:.8rem;font-weight:600;cursor:pointer;transition:all .15s}
.btn:hover{background:var(--card);color:var(--text)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 2px 10px rgba(0,122,255,.3)}
.btn-primary:hover{background:var(--accent-h);transform:translateY(-1px)}
.btn-lg{padding:13px 28px;font-size:.95rem;border-radius:18px}
.hs-chip{display:flex;align-items:center;gap:4px;padding:4px 10px;background:rgba(255,149,0,.1);border:1px solid rgba(255,149,0,.3);border-radius:var(--rf);color:var(--warning);font-size:.76rem;font-weight:700}
/* OVERLAYS */
.overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;padding:20px;animation:fade-in .2s ease}
@keyframes fade-in{from{opacity:0}}
.card{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:30px 26px;max-width:440px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.12);display:flex;flex-direction:column;align-items:center;gap:16px;animation:card-up .3s cubic-bezier(.34,1.56,.64,1);max-height:92dvh;overflow-y:auto}
@keyframes card-up{from{opacity:0;transform:translateY(24px) scale(.96)}}
.card-title{font-family:var(--serif);font-size:2rem;text-align:center;letter-spacing:-.02em;color:var(--text)}
.card-sub{font-size:.88rem;color:var(--text2);text-align:center;line-height:1.6}
.stats-row{display:flex;gap:20px;background:var(--bg);border:1px solid var(--border);border-radius:16px;padding:14px 22px;width:100%;justify-content:center}
.sbox{display:flex;flex-direction:column;align-items:center;gap:2px}
.snum{font-family:var(--serif);font-size:1.6rem;color:var(--accent)}
.slbl{font-size:.65rem;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;font-weight:500}
.diff-lbl{font-size:.68rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.diff-row{display:flex;gap:8px;width:100%}
.diff-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:11px 6px;background:var(--bg);border:2px solid var(--border);border-radius:13px;cursor:pointer;transition:all .15s;font-family:var(--font)}
.diff-btn.active{border-color:var(--accent);background:rgba(0,122,255,.07)}
.diff-btn:hover:not(.active){border-color:rgba(0,0,0,.18)}
.diff-icon{font-size:1.2rem}
.diff-name{font-size:.8rem;font-weight:700;color:var(--text)}
.diff-desc{font-size:.65rem;color:var(--text3)}
.end-emoji{font-size:2.8rem;animation:ep .5s cubic-bezier(.34,1.56,.64,1) both .1s}
@keyframes ep{from{opacity:0;transform:scale(.3) rotate(-20deg)}}
.score-ring{position:relative;display:flex;align-items:center;justify-content:center;width:130px;height:130px}
.ring-bg{stroke:var(--border)}
.ring-fill{stroke:var(--accent);stroke-linecap:round;transition:stroke-dashoffset 1.1s cubic-bezier(.4,0,.2,1) .3s;transform:rotate(-90deg);transform-origin:65px 65px}
.ring-txt{position:absolute;display:flex;align-items:baseline;gap:2px}
.ring-big{font-family:var(--serif);font-size:2.4rem;color:var(--text)}
.ring-of{font-size:.88rem;color:var(--text3);font-weight:500}
.end-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;width:100%}
.end-stat{background:var(--bg);border:1px solid var(--border);border-radius:11px;padding:10px 13px;display:flex;flex-direction:column;gap:2px}
.esl{font-size:.65rem;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}
.esv{font-family:var(--serif);font-size:1.4rem;color:var(--text)}
.esv.c{color:var(--success)}.esv.w{color:var(--error)}
.end-acts{display:flex;flex-direction:column;gap:8px;width:100%}
.badges{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;min-height:20px}
.badge{display:flex;align-items:center;gap:4px;padding:3px 10px;border-radius:var(--rf);font-size:.7rem;font-weight:600;background:rgba(255,149,0,.1);border:1px solid rgba(255,149,0,.3);color:var(--warning);animation:badge-pop .3s cubic-bezier(.34,1.56,.64,1) both}
@keyframes badge-pop{from{opacity:0;transform:scale(.7)}}
#confetti{position:fixed;inset:0;pointer-events:none;z-index:9998}
@media(max-width:480px){
  .nav-brand span:last-child{display:none}
  nav{padding:0 10px}
  .card{padding:22px 16px;gap:13px}
  .diff-desc{display:none}
  .stats-row{gap:14px;padding:12px 14px}
}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body>

<div id="loading">
  <svg class="ld-logo" width="60" height="60" viewBox="0 0 50 50" fill="none">
    <circle cx="25" cy="25" r="20" fill="#007AFF" opacity=".18"/>
    <path d="M10 25a15 15 0 1 1 30 0 15 15 0 0 1-30 0z" fill="#007AFF"/>
    <path d="M18 25c0-2 1-5 7-6-2 2 0 5-1 7s-4 3-3 6c-2-1-4-4-3-7z" fill="white" opacity=".9"/>
    <path d="M30 18c2 1 4 4 3 7-1-2-4-1-5 1s0 5-2 6c-1-2 1-4 0-6s-1-5 4-8z" fill="white" opacity=".7"/>
  </svg>
  <div class="ld-title">GeoQuest</div>
  <div class="ld-bar"><div class="ld-fill" id="ld-fill"></div></div>
</div>

<canvas id="confetti"></canvas>

<div id="app">
  <nav>
    <div class="nav-brand">
      <svg width="24" height="24" viewBox="0 0 50 50" fill="none">
        <path d="M10 25a15 15 0 1 1 30 0 15 15 0 0 1-30 0z" fill="#007AFF"/>
        <path d="M18 25c0-2 1-5 7-6-2 2 0 5-1 7s-4 3-3 6c-2-1-4-4-3-7z" fill="white" opacity=".9"/>
        <path d="M30 18c2 1 4 4 3 7-1-2-4-1-5 1s0 5-2 6c-1-2 1-4 0-6s-1-5 4-8z" fill="white" opacity=".7"/>
      </svg>
      <span>GeoQuest</span>
    </div>
    <div class="nav-stats">
      <div class="stat"><span class="stat-l">Score</span><span class="stat-v" id="nav-score">0</span></div>
      <div style="width:1px;height:14px;background:var(--border)"></div>
      <div class="stat"><span class="stat-l">Round</span><span class="stat-v" id="nav-round">1/10</span></div>
    </div>
    <div class="nav-btns">
      <button class="icon-btn" id="snd-btn" title="Toggle sound" aria-label="Toggle sound">
        <svg id="snd-icon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
      </button>
      <button class="icon-btn" id="theme-btn" title="Toggle dark mode" aria-label="Toggle dark mode">
        <svg id="theme-icon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/></svg>
      </button>
    </div>
    <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
  </nav>

  <main>
    <div class="prompt">
      <div class="prompt-inner">
        <div>
          <div class="prompt-lbl">Find this country</div>
          <div class="prompt-name" id="prompt-name">–</div>
          <div class="prompt-hint" id="prompt-hint"></div>
        </div>
        <div class="timer-wrap">
          <svg class="timer-ring" viewBox="0 0 42 42" width="42" height="42">
            <circle class="timer-bg" cx="21" cy="21" r="17" fill="none" stroke-width="3"/>
            <circle class="timer-fg" id="timer-fg" cx="21" cy="21" r="17" fill="none" stroke-width="3" stroke-dasharray="106.8" stroke-dashoffset="0"/>
          </svg>
          <div class="timer-txt" id="timer-txt">15</div>
        </div>
      </div>
    </div>

    <div class="map-wrap">
      <div class="map-inner" id="map-inner">
        <svg id="map-svg" viewBox="0 0 1010 500" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
      <div class="map-ctrls">
        <button class="map-btn" id="z-in">+</button>
        <button class="map-btn" id="z-out">−</button>
        <button class="map-btn" id="z-reset">⊙</button>
      </div>
      <div class="toast" id="toast">
        <span class="toast-icon" id="toast-icon"></span>
        <span class="toast-txt" id="toast-txt"></span>
      </div>
    </div>
  </main>

  <footer>
    <div class="streak" id="streak"></div>
    <div class="foot-row">
      <button class="btn" id="skip-btn">Skip</button>
      <div class="hs-chip">⭐ <span id="hs-val">0</span></div>
      <button class="btn" id="hint-btn">Hint 💡</button>
    </div>
  </footer>
</div>

<!-- START -->
<div class="overlay" id="start-screen">
  <div class="card">
    <svg width="56" height="56" viewBox="0 0 50 50" fill="none">
      <circle cx="25" cy="25" r="25" fill="#007AFF" opacity=".12"/>
      <path d="M10 25a15 15 0 1 1 30 0 15 15 0 0 1-30 0z" fill="#007AFF"/>
      <path d="M18 25c0-2 1-5 7-6-2 2 0 5-1 7s-4 3-3 6c-2-1-4-4-3-7z" fill="white" opacity=".9"/>
      <path d="M30 18c2 1 4 4 3 7-1-2-4-1-5 1s0 5-2 6c-1-2 1-4 0-6s-1-5 4-8z" fill="white" opacity=".7"/>
    </svg>
    <div class="card-title">GeoQuest</div>
    <div class="card-sub">How well do you know the world?<br>Click countries on the map to prove it.</div>
    <div class="stats-row">
      <div class="sbox"><span class="snum">60</span><span class="slbl">Countries</span></div>
      <div class="sbox"><span class="snum">10</span><span class="slbl">Rounds</span></div>
      <div class="sbox"><span class="snum" id="hs-display">0</span><span class="slbl">Best</span></div>
    </div>
    <div class="diff-lbl">Choose difficulty</div>
    <div class="diff-row" id="diff-row">
      <button class="diff-btn active" data-diff="easy"><span class="diff-icon">🌍</span><span class="diff-name">Easy</span><span class="diff-desc">Major nations</span></button>
      <button class="diff-btn" data-diff="medium"><span class="diff-icon">🧭</span><span class="diff-name">Medium</span><span class="diff-desc">More countries</span></button>
      <button class="diff-btn" data-diff="hard"><span class="diff-icon">🔬</span><span class="diff-name">Hard</span><span class="diff-desc">All regions</span></button>
    </div>
    <button class="btn btn-primary btn-lg" id="start-btn">Start Game ▶</button>
    <div style="font-size:.68rem;color:var(--text3)">H = hint · Esc = skip</div>
  </div>
</div>

<!-- END -->
<div class="overlay" id="end-screen" style="display:none">
  <div class="card">
    <div class="end-emoji" id="end-emoji">🌍</div>
    <div class="card-title" id="end-title">Game Over</div>
    <div class="card-sub" id="end-msg">Great attempt!</div>
    <div class="score-ring">
      <svg viewBox="0 0 130 130" width="130" height="130">
        <circle class="ring-bg" cx="65" cy="65" r="52" fill="none" stroke-width="8"/>
        <circle class="ring-fill" id="ring-fill" cx="65" cy="65" r="52" fill="none" stroke-width="8" stroke-dasharray="326.7" stroke-dashoffset="326.7"/>
      </svg>
      <div class="ring-txt"><span class="ring-big" id="final-score">0</span><span class="ring-of">/10</span></div>
    </div>
    <div class="end-grid">
      <div class="end-stat"><span class="esl">Correct</span><span class="esv c" id="e-correct">0</span></div>
      <div class="end-stat"><span class="esl">Wrong</span><span class="esv w" id="e-wrong">0</span></div>
      <div class="end-stat"><span class="esl">Best Score</span><span class="esv" id="e-hs">0</span></div>
      <div class="end-stat"><span class="esl">Accuracy</span><span class="esv" id="e-acc">0%</span></div>
    </div>
    <div class="badges" id="badges"></div>
    <div class="end-acts">
      <button class="btn btn-primary btn-lg" id="again-btn">Play Again</button>
      <button class="btn btn-lg" id="share-btn">Share Score</button>
    </div>
  </div>
</div>

<script>
'use strict';
// ── DATA ──────────────────────────────────────────────────────
const COUNTRIES=[
  {id:'BR',name:'Brazil',capital:'Brasília',flag:'🇧🇷',diff:'easy',hints:['Largest in South America','Amazon rainforest']},

let sndOn=getSnd(),audioCtx=null;
const ac=()=>{if(!audioCtx)try{audioCtx=new(window.AudioContext||window.webkitAudioContext)()}catch{}return audioCtx};
const playTone=(freqs,type='sine',dur=.15,vol=.14)=>{
  if(!sndOn)return;const c=ac();if(!c)return;const t=c.currentTime;
  freqs.forEach((f,i)=>{
    const o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);o.type=type;
    o.frequency.setValueAtTime(f,t+i*.06);
    g.gain.setValueAtTime(vol,t+i*.06);
    g.gain.exponentialRampToValueAtTime(.001,t+i*.06+dur);
    o.start(t+i*.06);o.stop(t+i*.06+dur+.05);
  });
};
const Snd={
  correct:()=>playTone([523,659,784],'triangle',.2,.17),
  wrong:()=>playTone([330,277],'sawtooth',.18,.12),
  click:()=>playTone([880],'sine',.06,.07),
  start:()=>playTone([262,330,392,523],'triangle',.18,.14),
  victory:()=>playTone([523,659,784,1047],'triangle',.25,.18),
  tick:()=>playTone([440],'square',.07,.06),
};

// ── CONFETTI ──────────────────────────────────────────────
const CVSC=document.getElementById('confetti');
const CVSX=CVSC.getContext('2d');
let cParts=[],cRaf=null;
const COLS=['#007AFF','#34C759','#FF9500','#FF3B30','#AF52DE','#5AC8FA','#FFD60A'];
const cResize=()=>{CVSC.width=innerWidth;CVSC.height=innerHeight};
addEventListener('resize',cResize);cResize();
const mkP=()=>({x:Math.random()*CVSC.width,y:-10,r:Math.random()*6+3,vx:(Math.random()-.5)*3,vy:Math.random()*3+2,color:COLS[Math.floor(Math.random()*COLS.length)],angle:Math.random()*Math.PI*2,spin:(Math.random()-.5)*.2,rect:Math.random()>.5,alpha:1});
const cLoop=()=>{
  CVSX.clearRect(0,0,CVSC.width,CVSC.height);
  cParts=cParts.filter(p=>p.alpha>.05);
  cParts.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=.06;p.angle+=p.spin;
    if(p.y>CVSC.height*.7)p.alpha-=.02;
    CVSX.save();CVSX.globalAlpha=p.alpha;CVSX.translate(p.x,p.y);CVSX.rotate(p.angle);CVSX.fillStyle=p.color;
    if(p.rect)CVSX.fillRect(-p.r/2,-p.r/2,p.r,p.r*1.5);
    else{CVSX.beginPath();CVSX.arc(0,0,p.r/2,0,Math.PI*2);CVSX.fill();}
    CVSX.restore();
  });
  if(cParts.length)cRaf=requestAnimationFrame(cLoop);
  else{CVSX.clearRect(0,0,CVSC.width,CVSC.height);cRaf=null;}
};
const burstConfetti=(n=120)=>{for(let i=0;i<n;i++)setTimeout(()=>cParts.push(mkP()),i*12);if(!cRaf)cLoop();};
const stopConfetti=()=>{cParts=[];if(cRaf){cancelAnimationFrame(cRaf);cRaf=null;}CVSX.clearRect(0,0,CVSC.width,CVSC.height);};

const svg=document.getElementById('map-svg');
const mapInner=document.getElementById('map-inner');
let mScale=1,mOx=0,mOy=0,mDrag=false,mDs={x:0,y:0};
let mapClickCb=null;

// Build SVG
const ns='http://www.w3.org/2000/svg';
const bg=document.createElementNS(ns,'rect');
bg.setAttribute('width','1010');bg.setAttribute('height','500');bg.setAttribute('fill','var(--map-ocean)');bg.style.cursor='default';
svg.appendChild(bg);
PATHS.forEach(([id,d])=>{
  const p=document.createElementNS(ns,'path');
  p.setAttribute('d',d);p.dataset.id=id;
  p.setAttribute('tabindex','0');
  p.setAttribute('aria-label',(CMAP.get(id)||{name:id}).name);
  svg.appendChild(p);
});

const mApply=()=>svg.style.transform=`translate(${mOx}px,${mOy}px) scale(${mScale})`;
const mClamp=()=>{
  const mx=mapInner.clientWidth*(mScale-1)/2+80;
  const my=mapInner.clientHeight*(mScale-1)/2+80;
  mOx=Math.max(-mx,Math.min(mx,mOx));mOy=Math.max(-my,Math.min(my,mOy));
};
svg.addEventListener('click',e=>{const p=e.target.closest('[data-id]');if(p&&mapClickCb){Snd.click();mapClickCb(p.dataset.id);}});
svg.addEventListener('keydown',e=>{if((e.key==='Enter'||e.key===' ')&&e.target.dataset.id){e.preventDefault();Snd.click();if(mapClickCb)mapClickCb(e.target.dataset.id);}});
mapInner.addEventListener('pointerdown',e=>{if(e.target.closest('[data-id]'))return;mDrag=true;mDs={x:e.clientX-mOx,y:e.clientY-mOy};mapInner.setPointerCapture(e.pointerId);});
mapInner.addEventListener('pointermove',e=>{if(!mDrag)return;mOx=e.clientX-mDs.x;mOy=e.clientY-mDs.y;mClamp();mApply();});
mapInner.addEventListener('pointerup',()=>mDrag=false);
mapInner.addEventListener('pointercancel',()=>mDrag=false);
mapInner.addEventListener('wheel',e=>{e.preventDefault();mScale=Math.max(.8,Math.min(4,mScale*(e.deltaY>0?.9:1.1)));mClamp();mApply();},{passive:false});
document.getElementById('z-in').onclick=()=>{mScale=Math.min(4,mScale*1.25);mClamp();mApply();};
document.getElementById('z-out').onclick=()=>{mScale=Math.max(.8,mScale*.8);mClamp();mApply();};
document.getElementById('z-reset').onclick=()=>{mScale=1;mOx=0;mOy=0;mApply();};
const clearMap=()=>svg.querySelectorAll('[data-id]').forEach(p=>p.className='');
const markMap=(id,cls)=>{const p=svg.querySelector(`[data-id="${id}"]`);if(p){p.className='';p.classList.add(cls);}};

};

// ── GAME ─────────────────────────────────────────────────
let score=0,round=0,rounds=[],diff='easy',history=[],timerSec=0,timerMax=15,timerID=null,current=null,curHs=hs();
const MAX=10,TMAX={easy:20,medium:15,hard:10};
const shuffle=a=>{const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;};
const pool=d=>{const t={easy:['easy'],medium:['easy','medium'],hard:['easy','medium','hard']}[d]||['easy'];return COUNTRIES.filter(c=>t.includes(c.diff));};

const buildStreak=()=>{
  const s=$('streak');s.innerHTML='';
  for(let i=0;i<MAX;i++){const d=document.createElement('div');d.className='dot'+(i===0?' cur':'');s.appendChild(d);}
};
const markDot=(idx,type)=>{
  const dots=$('streak').querySelectorAll('.dot');
  if(dots[idx]){dots[idx].classList.remove('cur');dots[idx].className=`dot ${type}`;}
  if(dots[idx+1])dots[idx+1].classList.add('cur');
};
const stopTimer=()=>{clearInterval(timerID);timerID=null;};
const startTimer=()=>{
  stopTimer();timerSec=timerMax;setTimerUI(timerSec,timerMax);
  timerID=setInterval(()=>{timerSec--;setTimerUI(timerSec,timerMax);if(timerSec<=0){stopTimer();onTimeout();}},1000);
};

const nextRound=()=>{
  if(round>=MAX){endGame();return;}
  current=rounds[round];
  if(!current){round++;nextRound();return;}
  const el=$('prompt-name');
  el.style.animation='none';
  requestAnimationFrame(()=>{el.style.animation='';el.textContent=current.name;});
  $('prompt-hint').textContent='';
  $('nav-round').textContent=`${round+1}/${MAX}`;
  $('prog-fill').style.width=`${(round/MAX)*100}%`;
  clearMap();startTimer();
};

const resolve=(ok,msg)=>{
  stopTimer();history.push(ok?'correct':'wrong');markDot(round,ok?'correct':'wrong');
  if(ok){score++;const sv=$('nav-score');sv.textContent=score;sv.classList.remove('bump');requestAnimationFrame(()=>sv.classList.add('bump'));}
  showToast(ok?'correct':'wrong',msg);
  if(ok)markMap(current.id,'correct');
  else{markMap(current.id,'wrong');setTimeout(()=>markMap(current.id,'target'),500);}
  ok?Snd.correct():Snd.wrong();
  round++;setTimeout(()=>{clearMap();nextRound();},1800);
};

const onTimeout=()=>{
  history.push('wrong');markDot(round,'wrong');
  if(current)markMap(current.id,'target');
  showToast('wrong',`⏰ Time's up! – ${current?.name||'?'}`);
  Snd.wrong();round++;setTimeout(()=>{clearMap();nextRound();},1800);
};

const endGame=()=>{
  stopTimer();
  if(score>curHs){curHs=score;setHs(curHs);}
  $('hs-val').textContent=curHs;$('hs-display').textContent=curHs;
  const correct=history.filter(r=>r==='correct').length;
  $('final-score').textContent=score;
  $('e-correct').textContent=correct;
  $('e-wrong').textContent=MAX-correct;
  $('e-hs').textContent=curHs;
  $('e-acc').textContent=Math.round(correct/MAX*100)+'%';
  setTimeout(()=>{
    $('ring-fill').style.strokeDashoffset=326.7*(1-score/MAX);
    $('ring-fill').style.stroke=score>=8?'var(--success)':score>=5?'var(--accent)':'var(--error)';
  },200);
  const msgs=[
    {min:10,e:'🏆',t:'Perfect Score!',  m:'You know the world inside out!'},
    {min:8, e:'⭐',t:'Excellent!',      m:'Incredible geography skills!'},
    {min:6, e:'🌍',t:'Well Done!',      m:'Solid knowledge of the world map.'},
    {min:4, e:'🧭',t:'Good Attempt!',   m:"Keep exploring — you'll get better!"},
    {min:0, e:'🌱',t:'Keep Learning!',  m:'The world is vast — keep exploring!'},
  ];
  const r=msgs.find(m=>score>=m.min)||msgs[4];
  $('end-emoji').textContent=r.e;$('end-title').textContent=r.t;$('end-msg').textContent=r.m;
  const bd=$('badges');bd.innerHTML='';
  const addBadge=(icon,label)=>{const b=document.createElement('div');b.className='badge';b.textContent=`${icon} ${label}`;bd.appendChild(b);};
  if(score===10)addBadge('🏆','Perfect Score');
  if(score>=8)addBadge('⭐','Expert');
  let streak=0;for(const r of history){if(r==='correct'){streak++;if(streak>=3){addBadge('🔥','3 in a row');break;}}else streak=0;}
  if(score===0)addBadge('😅','Keep Practicing');
  $('end-screen').style.display='flex';
  if(score===MAX){setTimeout(()=>burstConfetti(),300);Snd.victory();}
};

const startGame=()=>{
  stopConfetti();score=0;round=0;history=[];
  timerMax=TMAX[diff]||15;
  $('nav-score').textContent=0;$('nav-round').textContent=`1/${MAX}`;$('prog-fill').style.width='0';
  $('hs-val').textContent=curHs;$('end-screen').style.display='none';$('start-screen').style.display='none';
  $('ring-fill').style.strokeDashoffset='326.7';
  clearMap();mScale=1;mOx=0;mOy=0;mApply();buildStreak();
  const ids=new Set([...svg.querySelectorAll('[data-id]')].map(p=>p.dataset.id));
  let p=shuffle(pool(diff)).filter(c=>ids.has(c.id));
  rounds=p.slice(0,MAX);
  if(rounds.length<MAX){const ex=shuffle(COUNTRIES).filter(c=>!rounds.includes(c)&&ids.has(c.id));rounds=[...rounds,...ex].slice(0,MAX);}
  Snd.start();nextRound();
};

// ── WIRING ────────────────────────────────────────────────
mapClickCb=id=>resolve(id===current?.id,id===current?.id?`✨ ${current.name}!`:`It was ${current?.name||'?'}`);
$('start-btn').addEventListener('click',()=>{Snd.click();startGame();});
$('again-btn').addEventListener('click',()=>{Snd.click();startGame();});
$('skip-btn').addEventListener('click',()=>{
  if(!current)return;Snd.click();stopTimer();
  history.push('wrong');markDot(round,'wrong');
  showToast('wrong',`Skipped – ${current.name}`);markMap(current.id,'target');Snd.wrong();
  round++;setTimeout(()=>{clearMap();nextRound();},1800);
});
$('hint-btn').addEventListener('click',()=>{
  if(!current)return;Snd.click();
  const h=current.hints;
  $('prompt-hint').textContent=h&&h.length?`💡 ${h[0]}`:`💡 Capital: ${current.capital}`;
});
$('share-btn').addEventListener('click',()=>{
  const txt=`🌍 GeoQuest: I scored ${$('final-score').textContent}/10! Can you beat me?`;
  if(navigator.share)navigator.share({title:'GeoQuest',text:txt}).catch(()=>{});
  else if(navigator.clipboard)navigator.clipboard.writeText(txt).then(()=>showToast('correct','Copied!'));
});
$('diff-row').addEventListener('click',e=>{
  const b=e.target.closest('.diff-btn');if(!b)return;
  document.querySelectorAll('.diff-btn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');diff=b.dataset.diff;Snd.click();
});
$('theme-btn').addEventListener('click',()=>{
  const dark=document.documentElement.getAttribute('data-theme')==='dark';
  const t=dark?'light':'dark';
  document.documentElement.setAttribute('data-theme',t);setTheme(t);
  $('theme-icon').innerHTML=dark
    ?'<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>'
    :'<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
});
$('snd-btn').addEventListener('click',()=>{
  sndOn=!sndOn;setSnd(sndOn);
  $('snd-icon').innerHTML=sndOn
    ?'<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>'
    :'<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>';
});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')$('skip-btn').click();
  if(e.key==='h'||e.key==='H')$('hint-btn').click();
});

// ── INIT ─────────────────────────────────────────────────
(()=>{
  // Apply saved theme
  const t=getTheme();
  document.documentElement.setAttribute('data-theme',t);
  if(t==='dark')$('theme-icon').innerHTML='<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
  if(!sndOn)$('snd-icon').innerHTML='<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>';
  $('hs-display').textContent=curHs;$('hs-val').textContent=curHs;

  // Show app — simple and guaranteed
  const fill=$('ld-fill');
  fill.style.width='100%';
  setTimeout(()=>{
    $('loading').classList.add('out');
    $('app').style.display='flex';
    $('start-screen').style.display='flex';
    setTimeout(()=>$('loading').style.display='none',400);
  },500);
})();
</script>
</body>
</html>
